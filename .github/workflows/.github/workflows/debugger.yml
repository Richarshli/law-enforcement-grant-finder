name: Automated Repository Debugger
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run debugger
        run: python scripts/automated_debugger.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debugging-report
          path: reports/
