name: Daily Grant Information Update
on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update approved source health
        run: python scripts/update_information.py
      - name: Run debugger
        run: python scripts/automated_debugger.py
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          git commit -m "chore: update grant source information"
          git push
